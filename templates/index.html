<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot with NLP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            height: 600px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px 15px 0 0;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 12px;
            opacity: 0.9;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .message {
            margin-bottom: 15px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            text-align: right;
        }

        .message.bot {
            text-align: left;
        }

        .message-content {
            display: inline-block;
            padding: 12px 16px;
            border-radius: 15px;
            max-width: 80%;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-radius: 20px 20px 0 20px;
        }

        .message.bot .message-content {
            background: #e0e0e0;
            color: #333;
            border-radius: 20px 20px 20px 0;
        }

        .message-meta {
            font-size: 10px;
            color: #999;
            margin-top: 5px;
            display: none;
        }

        .message.bot .message-meta {
            text-align: left;
        }

        .message.user .message-meta {
            text-align: right;
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .input-area input:focus {
            outline: none;
            border-color: #667eea;
        }

        .input-area button {
            padding: 12px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.3s;
        }

        .input-area button:hover {
            background: #5568d3;
        }

        .input-area button:active {
            transform: scale(0.95);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 10px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .controls {
            display: flex;
            gap: 10px;
            padding: 10px 20px;
            background: #f9f9f9;
            border-radius: 0 0 15px 15px;
        }

        .controls button {
            flex: 1;
            padding: 8px;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .controls button:hover {
            background: #e0e0e0;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #999;
            text-align: center;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .info-badge {
            display: inline-block;
            background: #e3f2fd;
            color: #1976d2;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 10px;
            margin-top: 5px;
        }

        @media (max-width: 600px) {
            .container {
                height: 500px;
                border-radius: 10px;
            }

            .header h1 {
                font-size: 20px;
            }

            .message-content {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AI Chatbot</h1>
            <p>Powered by NLP Technology</p>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="empty-state">
                <div class="empty-state-icon">💬</div>
                <p>Start a conversation with me!</p>
                <small style="color: #bbb; margin-top: 10px;">Type your message below</small>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
        </div>

        <div class="input-area">
            <input 
                type="text" 
                id="messageInput" 
                placeholder="Type your message here..."
                autocomplete="off"
            >
            <button onclick="sendMessage()">Send</button>
        </div>

        <div class="controls">
            <button onclick="clearChat()">Clear Chat</button>
            <button onclick="showHistory()">History</button>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const messageInput = document.getElementById('messageInput');
        const loading = document.getElementById('loading');
        let firstMessage = true;

        // Clear empty state on first message
        function clearEmptyState() {
            if (firstMessage) {
                chatArea.innerHTML = '';
                firstMessage = false;
            }
        }

        // Send message function
        function sendMessage() {
            const message = messageInput.value.trim();

            if (!message) {
                alert('Please type a message!');
                return;
            }

            // Clear empty state
            clearEmptyState();

            // Add user message to chat
            addMessage(message, 'user');
            messageInput.value = '';
            messageInput.focus();

            // Show loading indicator
            loading.style.display = 'block';

            // Send request to backend
            fetch('/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ message: message })
            })
            .then(response => response.json())
            .then(data => {
                loading.style.display = 'none';

                if (data.success) {
                    addMessage(data.response, 'bot', data.intent, data.confidence);
                } else {
                    addMessage('Sorry, I encountered an error. Please try again.', 'bot');
                }
            })
            .catch(error => {
                loading.style.display = 'none';
                console.error('Error:', error);
                addMessage('Connection error. Please try again.', 'bot');
            });
        }

        // Add message to chat display
        function addMessage(text, sender, intent = null, confidence = null) {
            clearEmptyState();

            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ' + sender;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            // contentDiv.textContent = text;
            contentDiv.innerHTML = text;

            messageDiv.appendChild(contentDiv);

            if (sender === 'bot' && intent && confidence !== null) {
                const metaDiv = document.createElement('div');
                metaDiv.className = 'message-meta';
                metaDiv.innerHTML = `<span class="info-badge">Intent: ${intent} (${(confidence * 100).toFixed(0)}%)</span>`;
                messageDiv.appendChild(metaDiv);
            }

            chatArea.appendChild(messageDiv);

            // Scroll to bottom
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // Clear chat function
        function clearChat() {
            if (confirm('Are you sure you want to clear the chat?')) {
                chatArea.innerHTML = '';
                firstMessage = true;
                chatArea.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">💬</div>
                        <p>Chat cleared! Start fresh.</p>
                    </div>
                `;
            }
        }

        // Show chat history
        function showHistory() {
            fetch('/history')
            .then(response => response.json())
            .then(data => {
                if (data.success && data.history.length > 0) {
                    let historyText = 'Chat History:\n\n';
                    data.history.forEach((item, index) => {
                        historyText += `${index + 1}. You: ${item.user}\n`;
                        historyText += `   Intent: ${item.intent} (Confidence: ${(item.confidence * 100).toFixed(0)}%)\n\n`;
                    });
                    alert(historyText);
                } else {
                    alert('No chat history available yet!');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Failed to load history');
            });
        }

        // Send message on Enter key
        messageInput.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        });

        // Focus input on load
        window.addEventListener('load', function() {
            messageInput.focus();
        });
    </script>
</body>
</html>
